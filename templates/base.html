<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Micro#CRM</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
.sidebar-desktop{
    min-height:100vh;
    background:#212529;
}

.sidebar-desktop a{
    color:white;
    text-decoration:none;
    display:block;
    padding:12px;
    border-radius:8px;
    margin-bottom:6px;
}

.sidebar-desktop a:hover{
    background:#343a40;
}

/* Active menu item */
.sidebar-desktop a.active{
    background:#495057;
    font-weight:600;
}

.mandatory {
    color: #f00;
}
</style>

<style id="nav-style">
.nav-link-custom {
    color: white;
    text-decoration: none;   /* ❌ remove underline */
    padding: 10px 12px;
    border-radius: 8px;
    transition: all 0.2s ease;
}

/* Hover */
.nav-link-custom:hover {
    background-color: rgba(255,255,255,0.1);
    text-decoration: none;
}

/* Active */
.active-nav {
    background-color: white;
    color: black !important;
    font-weight: 600;
}
</style>

</head>
<body>

<!-- ✅ Mobile Navbar (shows on small screens) -->
<nav class="navbar navbar-dark bg-dark d-md-none">
<div class="container-fluid">
    <span class="navbar-brand">Micro#CRM</span>

    <button class="navbar-toggler"
            type="button"
            data-bs-toggle="offcanvas"
            data-bs-target="#mobileMenu">
        <span class="navbar-toggler-icon"></span>
    </button>
</div>
</nav>

<!-- ✅ Mobile Slide Menu -->
<div class="offcanvas offcanvas-start bg-dark text-white d-md-none"
     tabindex="-1"
     id="mobileMenu">

<div class="offcanvas-header">
<h5>Menu</h5>

<button type="button"
        class="btn-close btn-close-white"
        data-bs-dismiss="offcanvas">
</button>

</div>

<div class="offcanvas-body">

<a href="/dashboard/"
class="nav-link-custom d-block mb-2 {% if '/dashboard' in request.path %}active-nav{% endif %}">
<i class="bi bi-speedometer2 me-2"></i> Dashboard
</a>

<a href="/contacts/"
class="nav-link-custom d-block mb-2 {% if '/contacts' in request.path %}active-nav{% endif %}">
<i class="bi bi-people me-2"></i> Contacts
</a>

<a href="/deals/"
class="nav-link-custom d-block mb-2 {% if request.GET.source != 'other' and '/deals' in request.path %}active-nav{% endif %}">
<i class="bi bi-briefcase me-2"></i> My Deals
</a>

<a href="/others/"
class="nav-link-custom d-block mb-2 {% if request.GET.source == 'other' or '/others' in request.path %}active-nav{% endif %}">
<i class="bi bi-briefcase me-2"></i> Other Deals
</a>

<a href="/logout/" class="btn btn-danger btn-sm">
Logout
</a>

</div>
</div>


<div class="container-fluid">
<div class="row">

<!-- ✅ Desktop Sidebar only medium+ screens -->
<div class="col-md-2 sidebar-desktop text-white p-3 d-none d-md-block">

<h5>Menu</h5>

<a href="/dashboard/"
class="{% if '/dashboard' in request.path %}active{% endif %}">
<i class="bi bi-speedometer2"></i> Dashboard
</a>

<a href="/contacts/"
class="{% if '/contacts' in request.path %}active{% endif %}">
<i class="bi bi-people"></i> Contacts
</a>

<a href="/deals/"
class="{% if request.GET.source != 'other' and '/deals' in request.path %}active{% endif %}">
<i class="bi bi-briefcase"></i> My Deals
</a>

<a href="/others/"
class="{% if request.GET.source == 'other' or '/others' in request.path %}active{% endif %}">
<i class="bi bi-briefcase"></i> Other Deals
</a>

<div class="mt-4">
<a href="/logout/" class="btn btn-outline-light btn-sm">
Logout
</a>
</div>

</div>

<!-- ✅ Content full width on mobile -->
<div class="col-12 col-md-10 p-3">
{% block content %}{% endblock %}
</div>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
document.getElementById("contactForm").addEventListener("submit", function(e) {

    let contact_name = document.getElementById("contact_name").value.trim();
    let contact_email = document.getElementById("contact_email").value.trim();
    let contact_phone = document.getElementById("contact_phone").value.trim();

    if (!contact_name) {
        e.preventDefault();
        Swal.fire({
            icon: 'warning',
            title: 'Mandatory',
            text: 'Enter contact name',
            width: '300px',   // 👈 reduce size
            padding: '1em'
        });
        return;
    }

    if (!contact_email) {
        e.preventDefault();
        Swal.fire({
            icon: 'warning',
            title: 'Mandatory',
            text: 'Enter contact email',
            width: '300px',   // 👈 reduce size
            padding: '1em'
        });
        return;
    }

    if (!contact_phone) {
        e.preventDefault();
        Swal.fire({
            icon: 'warning',
            title: 'Mandatory',
            text: 'Enter contact phone',
            width: '300px',   // 👈 reduce size
            padding: '1em'
        });
        return;
    }

    let emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
    if (!contact_email.match(emailPattern)) {
        e.preventDefault();
        Swal.fire({
            icon: 'warning',
            title: 'Invalid Email',
            text: 'Enter a valid email address',
            width: '300px',   // 👈 reduce size
            padding: '1em'
        });
        return;
    }

});
</script>

        });

    }

    if (!deal_desc) {

        Swal.fire({
            icon: 'warning',
            title: 'Mandatory',
            text: 'Enter deal description',
            width: '300px',   // 👈 reduce size
            padding: '1em'
        });
        return;
    }

    if (!deal_value) {
        e.preventDefault();
        Swal.fire({
            icon: 'warning',
            title: 'Mandatory',
            text: 'Enter deal value',
            width: '300px',   // 👈 reduce size
            padding: '1em'
        });

    }

    if (!deal_close_dt) {
        e.preventDefault();
        Swal.fire({
            icon: 'warning',
            title: 'Mandatory',
            text: 'Enter expected close date',
            width: '300px',   // 👈 reduce size
            padding: '1em'
        });
        return;
    }

    if (isNaN(deal_value) || Number(deal_value) <= 0) {
    e.preventDefault();
    Swal.fire({
        icon: 'warning',
        title: 'Invalid Amount',
        text: 'Enter a valid value amount',
        width: '300px',
        padding: '1em'
    });
    return;
}

});

</script>

<script>

    document.getElementById("customerForm").addEventListener("submit", function(e) {

    let contact_name = document.getElementById("contact_name").value.trim();
    let lead_status = document.getElementById("lead_status").value.trim();

    if (!contact_name) {
        e.preventDefault();
        Swal.fire({
            icon: 'warning',
            title: 'Mandatory',
            text: 'Select contact',
            width: '300px',   // 👈 reduce size
            padding: '1em'
        });
        return;
    }

    if (!lead_status) {
        e.preventDefault();
        Swal.fire({
            icon: 'warning',
            title: 'Mandatory',
            text: 'Select lead status',
            width: '300px',   // 👈 reduce size
            padding: '1em'
        });
        return;
    }
});

</script>

<script id="sweet-delete">
function confirmDelete(event, url, item) {
    event.preventDefault();

    Swal.fire({
        icon: 'warning',
        title: 'Are you sure?',
        text: 'Delete this ' + item + '?',
        width: '300px',
        padding: '1em',
        showCancelButton: true,
        confirmButtonText: 'Yes, delete',
        cancelButtonText: 'Cancel',
        confirmButtonColor: '#dc3545',   // red
        cancelButtonColor: '#6c757d'
    }).then((result) => {
        if (result.isConfirmed) {
            window.location.href = url;
        }
    });
}
</script>

<script>
{% if messages %}
    {% for message in messages %}
        Swal.fire({
            icon: 'error',
            title: 'Error',
            text: "{{ message }}",
            width: '300px',   // 👈 reduce size
            padding: '1em'
        });
    {% endfor %}
{% endif %}
</script>

</body>
</html>
