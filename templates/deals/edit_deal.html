{% extends 'base.html' %}

{% block content %}

<div class="card shadow p-4 col-md-6">

<h3>Edit Deal</h3>

<form method="POST" id="dealForm">
{% csrf_token %}

<div class="mb-3">
<label>Title<span class="mandatory">*</span></label>
<input
name="title"
value="{{ deal.title }}"
class="form-control" id="deal_title"
>
</div>

<div class="mb-3">
<label>Description<span class="mandatory">*</span></label>
<textarea name="description" class="form-control" id="deal_desc">{{ deal.description }}</textarea>
</div>

<div class="mb-3">
<label>Value<span class="mandatory">*</span></label>
<input
name="value"
value="{{ deal.value }}"
class="form-control" id="deal_value"
>
</div>

<div class="mb-3">
<label>Expected Close Date<span class="mandatory">*</span></label>
<input
name="expected_close_date"
value="{{ deal.expected_close_date|date:'Y-m-d' }}"
class="form-control"
type="date" id="deal_close_dt"
>
</div>

<button type="submit" class="btn btn-warning">
Update Deal
</button>
<a href="/deals/"
class="btn btn-secondary">
Cancel
</a>

</form>

</div>

{% endblock %}
