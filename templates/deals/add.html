{% extends 'base.html' %}

{% block content %}

<div class="card shadow p-4 col-md-6">
    <h3>Add Deal</h3>

    <form method="post">
        {% csrf_token %}

        <div class="mb-3">
            <label>Deal Title</label>
            <input name="title" class="form-control">
        </div>

        <div class="mb-3">
            <label>Description</label>
            <textarea name="description" class="form-control"></textarea>
        </div>

        <div class="mb-3">
            <label>Value</label>
            <input name="value" class="form-control">
        </div>

        <div class="mb-3">
            <label>Expected Close Date</label>
            <input name="expected_close_date" type="date" class="form-control">
        </div>

        <button class="btn btn-primary">Create Deal</button>
        <a href="/deals/"
        class="btn btn-secondary">
        Cancel
        </a>

    </form>
</div>

{% endblock %}
