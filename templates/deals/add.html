{% extends 'base.html' %}

{% block content %}

<div class="card shadow p-4 col-md-6">
    <h3>Add Deal</h3>

    <form method="post">
        {% csrf_token %}

        <div class="mb-3">
            <label>Deal Title</label>
            <input name="title" class="form-control">
        </div>

        <button class="btn btn-primary">Create Deal</button>

    </form>
</div>

{% endblock %}
