{% extends 'base.html' %}

{% block content %}

<div class="card shadow p-4 col-md-6">
    <h3>Add Deal</h3>

    <form method="POST" id="dealForm">
        {% csrf_token %}

        <div class="mb-3">
            <label>Deal Title<span class="mandatory">*</span></label>
            <input name="title" class="form-control" id="deal_title">
        </div>

        <div class="mb-3">
            <label>Description<span class="mandatory">*</span></label>
            <textarea name="description" class="form-control" id="deal_desc"></textarea>
        </div>

        <div class="mb-3">
            <label>Value<span class="mandatory">*</span></label>
            <input name="value" class="form-control" id="deal_value">
        </div>

        <div class="mb-3">
            <label>Expected Close Date<span class="mandatory">*</span></label>
            <input name="expected_close_date" type="date" class="form-control" id="deal_close_dt">
        </div>

        <button type="submit" class="btn btn-primary">Create Deal</button>
        <a href="/deals/"
        class="btn btn-secondary">
        Cancel
        </a>

    </form>
</div>

{% endblock %}
