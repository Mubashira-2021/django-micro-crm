{% extends 'base.html' %}

{% block content %}

<div class="card shadow p-4 col-md-6">
    <h3 class="mb-4">Add Contact</h3>

    <form method="POST" id="contactForm">
        {% csrf_token %}

        <div class="mb-3">
            <label>Name<span class="mandatory">*</span></label>
            <input name="name" id="contact_name" class="form-control" placeholder="Enter name">
        </div>

        <div class="mb-3">
            <label>Email<span class="mandatory">*</span></label>
            <input name="email" id="contact_email" type="email" class="form-control" placeholder="Enter email">
        </div>

        <div class="mb-3">
            <label>Phone<span class="mandatory">*</span></label>
            <input name="phone" id="contact_phone" class="form-control mb-2" placeholder="Enter Phone">
        </div>

        <div class="mb-3">
            <label>Company</label>
            <input name="company" class="form-control mb-2" placeholder="Enter Company">
        </div>

        <div class="mb-3">
            <label>Job Title</label>
            <input name="job_title" class="form-control mb-2" placeholder="Enter Job Title">
        </div>

        <div class="mb-3">
            <label>City</label>
            <input name="city" class="form-control mb-2" placeholder="Enter City">
        </div>

        <div class="mb-3">
            <label>Notes</label>
            <textarea name="notes" class="form-control mb-2" placeholder="Enter Notes"></textarea>
        </div>

        <button type="submit" class="btn btn-primary">Save Contact</button>
        <a href="/contacts/?view={{ view }}&q={{ q }}"
        class="btn btn-secondary">
        Cancel
        </a>

    </form>
</div>

{% endblock %}
