{% extends 'base.html' %}

{% block content %}

<div class="card shadow p-4 col-md-6">
    <h3 class="mb-4">Edit Contact</h3>

    <form method="post">
        {% csrf_token %}

        <div class="mb-3">
            <label>Name</label>
            <input name="name" value="{{ contact.name }}" class="form-control">
        </div>

        <div class="mb-3">
            <label>Email</label>
            <input name="email" value="{{ contact.email }}" class="form-control">
        </div>

        <button class="btn btn-warning">Update</button>
        <a href="/contacts/" class="btn btn-secondary">Cancel</a>

    </form>
</div>

{% endblock %}
