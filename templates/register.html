<!DOCTYPE html>
<html>
<head>

<title>Micro#CRM | Register</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-md-5">

<div class="card shadow p-4">

<h3 class="text-center mb-4">
Make Account in Micro#CRM
</h3>

<form method="POST" id="registerForm">
{% csrf_token %}

<input name="username" id="username"
type="text"
class="form-control mb-3"
placeholder="Username" required>

<input name="email" id="email"
type="email"
class="form-control mb-3"
placeholder="Email" required>

<input type="password" id="password"
name="password"
class="form-control mb-3"
placeholder="Password" required>

<input type="password" id="confirm"
name="confirm"
class="form-control mb-3"
placeholder="Confirm Password" required>

<button type="submit" class="btn btn-dark w-100">
Register
</button>

</form>

<div class="text-center mt-3">
<a href="/login/">
Already have account?
</a>
</div>

</div>

</div>

</div>

</div>

<script>
document.getElementById("registerForm").addEventListener("submit", function(e) {

    let username = document.getElementById("username").value.trim();
    let email = document.getElementById("email").value.trim();
    let password = document.getElementById("password").value;
    let confirmPassword = document.getElementById("confirm").value;

    // ❌ All fields required
    if (!username || !email || !password || !confirmPassword) {
        e.preventDefault();
        Swal.fire({
            icon: 'warning',
            title: 'Missing Fields',
            text: 'All fields are required',
            width: '300px',   // 👈 reduce size
            padding: '1em'
        });
        return;
    }

    // ❌ Username validation
    if (username.length < 4 || username.includes(" ")) {
        e.preventDefault();
        Swal.fire({
            icon: 'warning',
            title: 'Invalid Username',
            text: 'Username must be at least 4 characters with no spaces',
            width: '300px',   // 👈 reduce size
            padding: '1em'
        });
        return;
    }

    // ❌ Email validation
    let emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
    if (!email.match(emailPattern)) {
        e.preventDefault();
        Swal.fire({
            icon: 'warning',
            title: 'Invalid Email',
            text: 'Enter a valid email address',
            width: '300px',   // 👈 reduce size
            padding: '1em'
        });
        return;
    }

    // ❌ Password validation
    if (password.length < 8) {
        e.preventDefault();
        Swal.fire({
            icon: 'warning',
            title: 'Weak Password',
            text: 'Password must be at least 8 characters',
            width: '300px',   // 👈 reduce size
            padding: '1em'
        });
        return;
    }

    if (!/[A-Z]/.test(password)) {
        e.preventDefault();
        Swal.fire({
            icon: 'warning',
            title: 'Weak Password',
            text: 'Must contain 1 uppercase letter',
            width: '300px',   // 👈 reduce size
            padding: '1em'
        });
        return;
    }

    if (!/[0-9]/.test(password)) {
        e.preventDefault();
        Swal.fire({
            icon: 'warning',
            title: 'Weak Password',
            text: 'Must contain 1 number',
            width: '300px',   // 👈 reduce size
            padding: '1em'
        });
        return;
    }

    if (!/[!@#$%^&*]/.test(password)) {
        e.preventDefault();
        Swal.fire({
            icon: 'warning',
            title: 'Weak Password',
            text: 'Must contain 1 special character',
            width: '300px',   // 👈 reduce size
            padding: '1em'
        });
        return;
    }

    // ❌ Password match
    if (password !== confirmPassword) {
        e.preventDefault();
        Swal.fire({
            icon: 'warning',
            title: 'Password Mismatch',
            text: 'Passwords do not match',
            width: '300px',   // 👈 reduce size
            padding: '1em'
        });
        return;
    }

    // ✅ If all pass → form submits to Django
});
</script>

<script>
{% if messages %}
    {% for message in messages %}
        Swal.fire({
            icon: 'error',
            title: 'Error',
            text: "{{ message }}",
            width: '300px',   // 👈 reduce size
            padding: '1em'
        });
    {% endfor %}
{% endif %}
</script>

</body>
</html>
